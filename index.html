<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>제어반 전장 배치 · 배선 설계 (MVP)</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <!-- ZIP 해제 (EDZ 가져오기용) — 오프라인 동작을 위해 로컬 포함 -->
  <script src="vendor/fflate.min.js"></script>
  <style>
    html, body { height: 100%; margin: 0; }
    #canvas { width: 100%; height: 100%; display: block; background: #f8fafc; touch-action: none; cursor: default; }
    .toolbtn { font-size: 12px; padding: 4px 8px; border-radius: 6px; border: 1px solid #e2e8f0; }
    .toolbtn:hover { border-color: #93c5fd; }
    /* 핵심 레이아웃 폴백 — Tailwind CDN 미로딩(오프라인) 시에도 구조 유지 */
    .h-screen { height: 100vh; }
    .flex { display: flex; }
    .flex-col { flex-direction: column; }
    .flex-1 { flex: 1 1 auto; }
    .min-h-0 { min-height: 0; }
    .min-w-0 { min-width: 0; }
    .relative { position: relative; }
    .w-60 { width: 15rem; }
    .w-56 { width: 14rem; }
    .overflow-y-auto { overflow-y: auto; }
    .hidden { display: none; }
    /* 인쇄 / PDF 저장 — 캔버스만 출력 */
    @media print {
      header, aside, .no-canvas { display: none !important; }
      main { width: 100% !important; }
      #canvas { height: 100vh !important; }
    }
  </style>
</head>
<body class="bg-slate-100 text-slate-800 select-none">
  <div class="flex flex-col h-screen">

    <!-- 상단 툴바 (2단: 1단=도구/편집/파일/내보내기, 2단=배치·배선 옵션) -->
    <header class="flex flex-col bg-white border-b border-slate-200 no-canvas">
      <!-- 1단 -->
      <div class="flex items-center gap-2 px-3 py-2 flex-wrap">
        <h1 class="text-sm font-bold text-slate-700 mr-2">⚡ 제어반 배치설계</h1>

        <div class="flex items-center gap-1 mr-1">
          <button id="tool-select" class="toolbtn bg-white text-slate-700" title="선택/이동 (V)">↖ 선택</button>
          <button id="tool-duct-h" class="toolbtn bg-white text-slate-700" title="가로 덕트">덕트 ─</button>
          <button id="tool-duct-v" class="toolbtn bg-white text-slate-700" title="세로 덕트">덕트 │</button>
          <button id="tool-rail-h" class="toolbtn bg-white text-slate-700" title="가로 레일">레일 ─</button>
          <button id="tool-rail-v" class="toolbtn bg-white text-slate-700" title="세로 레일">레일 │</button>
          <button id="tool-wire" class="toolbtn bg-white text-slate-700" title="단자 연결(와이어): 단자 클릭 → 단자 클릭">⚯ 배선</button>
          <button id="tool-dim" class="toolbtn bg-white text-slate-700" title="치수: 점→점→위치 클릭 (스냅). 가운데 핸들로 이동">↔ 치수</button>
        </div>

        <div class="h-5 w-px bg-slate-200 mx-1"></div>

        <button id="act-rotate" class="toolbtn bg-white text-slate-700" title="회전 (R)">⟳ 회전</button>
        <button id="act-dup" class="toolbtn bg-white text-slate-700" title="복제 (Ctrl+D)">⎘ 복제</button>
        <button id="act-lock" class="toolbtn bg-white text-slate-700" title="잠금/해제 (덕트·레일·부품 고정)">🔒 잠금</button>
        <button id="act-delete" class="toolbtn bg-white text-slate-700" title="삭제 (Del)">🗑 삭제</button>
        <button id="act-undo" class="toolbtn bg-white text-slate-700" title="실행취소 (Ctrl+Z)">↶</button>
        <button id="act-redo" class="toolbtn bg-white text-slate-700" title="다시실행 (Ctrl+Shift+Z)">↷</button>

        <div class="h-5 w-px bg-slate-200 mx-1"></div>

        <button id="act-new" class="toolbtn bg-white text-slate-700">새로</button>
        <button id="act-save" class="toolbtn bg-emerald-600 text-white border-emerald-600">💾 저장(JSON)</button>
        <button id="act-load" class="toolbtn bg-white text-slate-700">📂 불러오기</button>
        <button id="act-custom" class="toolbtn bg-teal-600 text-white border-teal-600" title="박스 크기·단자 직접 만들기">＋ 커스텀 부품</button>
        <button id="act-edz" class="toolbtn bg-violet-600 text-white border-violet-600">＋ EDZ 가져오기</button>
        <input id="edz-file" type="file" accept=".edz,.zip" class="hidden" />

        <div class="h-5 w-px bg-slate-200 mx-1"></div>

        <button id="act-bom" class="toolbtn bg-white text-slate-700" title="부품 BOM CSV">BOM</button>
        <button id="act-wlist" class="toolbtn bg-white text-slate-700" title="배선표 CSV">배선표</button>
        <button id="act-png" class="toolbtn bg-white text-slate-700" title="도면 PNG">🖼 PNG</button>
        <button id="act-print" class="toolbtn bg-white text-slate-700" title="인쇄 / PDF 저장">🖨 인쇄</button>

        <div class="ml-auto flex items-center gap-2">
          <span id="autosave-badge" class="text-[10px] px-1.5 py-0.5 rounded bg-slate-100 text-slate-500"></span>
          <span id="status-msg" class="text-xs text-blue-600 opacity-0 transition-opacity"></span>
        </div>
      </div>

      <!-- 2단: 배치·배선 옵션 -->
      <div class="flex items-center gap-3 px-3 py-1.5 flex-wrap bg-slate-50 border-t border-slate-100 text-xs">
        <span class="font-semibold text-slate-400">배치</span>
        <label class="text-slate-500 flex items-center gap-1">덕트폭
          <select id="duct-width" class="border border-slate-300 rounded px-1 py-0.5 text-xs">
            <option value="40">40</option>
            <option value="60" selected>60</option>
            <option value="80">80</option>
            <option value="100">100</option>
          </select>mm
        </label>

        <div class="h-4 w-px bg-slate-200"></div>

        <span class="font-semibold text-slate-400">배선</span>
        <label class="text-slate-500 flex items-center gap-1" title="배선 시 부여할 라인번호(자동 증가). 비우면 W1·W2…">라인번호
          <input id="wire-next" type="text" placeholder="자동(W#)" class="w-20 border border-slate-300 rounded px-1 py-0.5 text-xs" />
        </label>

        <label class="text-slate-500 flex items-center gap-1" title="같은 경로로 겹쳐 지나가는 배선을 나란히 벌려 구분">
          <input id="wire-spread" type="checkbox" checked /> 겹선 분리
        </label>

        <label class="text-slate-500 flex items-center gap-1" title="배선 모서리 둥글기(라운드) 반지름. 0이면 직각">라운드
          <input id="wire-round" type="number" min="0" step="1" value="0" class="w-14 border border-slate-300 rounded px-1 py-0.5 text-xs text-right" />mm
        </label>

        <label class="text-slate-500 flex items-center gap-1" title="배선 프리셋(색상·두께·규격) 선택">프리셋
          <select id="wire-preset" class="w-28 border border-slate-300 rounded px-1 py-0.5 text-xs"></select>
        </label>
        <button id="wire-preset-save" class="toolbtn bg-white text-slate-600" title="현재 색상·두께·규격을 프리셋으로 저장">＋ 저장</button>
        <button id="wire-preset-del" class="toolbtn bg-white text-slate-600" title="선택한 프리셋 삭제">✕</button>

        <div class="h-4 w-px bg-slate-200"></div>

        <button id="wire-flow" class="toolbtn bg-white text-slate-600" title="전류 흐름 애니메이션 재생/정지 (AC=맥동, DC=정속). 배선의 전원구분을 AC/DC로 지정하세요.">▶ 흐름</button>
      </div>
    </header>

    <div class="flex flex-1 min-h-0">
      <!-- 좌측: 부품 라이브러리 -->
      <aside class="w-60 bg-white border-r border-slate-200 flex flex-col no-canvas">
        <div class="px-3 py-2 border-b border-slate-100">
          <div class="flex items-center justify-between mb-1">
            <span class="text-xs font-bold text-slate-600">부품 라이브러리</span>
            <span id="palette-count" class="text-[10px] text-slate-400">0 / 0</span>
          </div>
          <input id="palette-search" type="text" placeholder="검색 (예: MCCB, MC, PLC)"
            class="w-full px-2 py-1 text-xs border border-slate-300 rounded" />
        </div>
        <div id="palette-list" class="flex-1 overflow-y-auto p-2 space-y-1"></div>
        <div class="px-3 py-2 border-t border-slate-100">
          <div class="flex gap-1 mb-1">
            <button id="lib-export" class="toolbtn bg-white text-slate-600 flex-1">내 부품 내보내기</button>
            <button id="lib-import" class="toolbtn bg-white text-slate-600 flex-1">가져오기</button>
          </div>
          <div class="text-[10px] text-slate-400 leading-relaxed">
            부품 클릭 → 캔버스 클릭으로 배치 · Shift+클릭: 연속.
          </div>
        </div>
      </aside>

      <!-- 중앙: 캔버스 -->
      <main class="flex-1 relative min-w-0">
        <svg id="canvas"></svg>
        <div class="absolute bottom-2 left-2 text-[10px] text-slate-400 bg-white/80 px-2 py-1 rounded no-canvas">
          휠:줌 · Space/우클릭드래그:이동 · 빈공간드래그:영역선택 · 방향키:미세이동 · Ctrl+D:복제 · 배선:단자→단자 · <span id="counts" class="text-slate-500 font-semibold"></span>
        </div>
      </main>

      <!-- 우측: 전장 설정 + 인스펙터 -->
      <aside class="w-56 bg-white border-l border-slate-200 flex flex-col no-canvas">
        <div class="px-3 py-2 border-b border-slate-100">
          <div class="text-xs font-bold text-slate-600 mb-2">전장(플레이트) 설정</div>
          <label class="flex items-center justify-between py-0.5">
            <span class="text-xs text-slate-500">제목</span>
            <input id="panel-title" type="text" placeholder="배치도 제목" class="w-32 px-2 py-1 text-xs border border-slate-300 rounded" />
          </label>
          <label class="flex items-center justify-between py-0.5">
            <span class="text-xs text-slate-500">가로(mm)</span>
            <input id="panel-w" type="number" class="w-20 px-2 py-1 text-xs border border-slate-300 rounded text-right" />
          </label>
          <label class="flex items-center justify-between py-0.5">
            <span class="text-xs text-slate-500">세로(mm)</span>
            <input id="panel-h" type="number" class="w-20 px-2 py-1 text-xs border border-slate-300 rounded text-right" />
          </label>
          <label class="flex items-center justify-between py-0.5">
            <span class="text-xs text-slate-500">격자(mm)</span>
            <input id="panel-grid" type="number" class="w-20 px-2 py-1 text-xs border border-slate-300 rounded text-right" />
          </label>
          <button id="panel-fit" class="mt-2 w-full toolbtn bg-slate-100 text-slate-700">화면 맞춤</button>
        </div>
        <div class="px-3 py-2 border-b border-slate-100">
          <div class="text-xs font-bold text-slate-600 mb-1">글씨 크기 (배율)</div>
          <label class="flex items-center justify-between py-0.5"><span class="text-xs text-slate-500">카테고리</span>
            <input id="font-ctype" type="number" step="0.1" min="0.3" class="w-16 px-2 py-1 text-xs border border-slate-300 rounded text-right" value="1"/></label>
          <label class="flex items-center justify-between py-0.5"><span class="text-xs text-slate-500">호기번호</span>
            <input id="font-ctag" type="number" step="0.1" min="0.3" class="w-16 px-2 py-1 text-xs border border-slate-300 rounded text-right" value="1"/></label>
          <label class="flex items-center justify-between py-0.5"><span class="text-xs text-slate-500">부품 이름</span>
            <input id="font-cname" type="number" step="0.1" min="0.3" class="w-16 px-2 py-1 text-xs border border-slate-300 rounded text-right" value="1"/></label>
          <label class="flex items-center justify-between py-0.5"><span class="text-xs text-slate-500">단자 번호</span>
            <input id="font-term" type="number" step="0.1" min="0.3" class="w-16 px-2 py-1 text-xs border border-slate-300 rounded text-right" value="1"/></label>
          <label class="flex items-center justify-between py-0.5"><span class="text-xs text-slate-500">배선 라벨</span>
            <input id="font-wire" type="number" step="0.1" min="0.3" class="w-16 px-2 py-1 text-xs border border-slate-300 rounded text-right" value="1"/></label>
          <label class="flex items-center justify-between py-0.5"><span class="text-xs text-slate-500">치수 글자</span>
            <input id="font-dim" type="number" step="0.1" min="0.3" class="w-16 px-2 py-1 text-xs border border-slate-300 rounded text-right" value="1"/></label>
        </div>
        <div class="px-3 py-2 border-b border-slate-100">
          <div class="text-xs font-bold text-slate-600 mb-1">속성</div>
          <div id="inspector"></div>
        </div>
      </aside>
    </div>
  </div>

  <!-- 커스텀 부품 / 단자 에디터 모달 -->
  <div id="part-editor" class="no-canvas" style="position:fixed;inset:0;background:rgba(15,23,42,.45);display:none;align-items:center;justify-content:center;z-index:50;">
    <div style="background:#fff;border-radius:10px;width:640px;max-width:95vw;box-shadow:0 10px 40px rgba(0,0,0,.25);overflow:hidden;">
      <div class="flex items-center justify-between px-4 py-2 border-b border-slate-200">
        <span id="pe-title" class="text-sm font-bold text-slate-700">커스텀 부품 만들기</span>
        <button id="pe-cancel" class="text-slate-400 hover:text-slate-700 text-lg leading-none">✕</button>
      </div>
      <div class="flex" style="height:380px;">
        <!-- 좌: 미리보기 -->
        <div class="flex-1 bg-slate-50 border-r border-slate-100" style="min-width:0;">
          <svg id="pe-canvas" style="width:100%;height:100%;display:block;touch-action:none;cursor:crosshair;"></svg>
        </div>
        <!-- 우: 속성 + 단자 목록 -->
        <div class="w-56 flex flex-col">
          <div class="p-3 space-y-2 border-b border-slate-100">
            <label class="flex items-center justify-between"><span class="text-xs text-slate-500">품명</span>
              <input id="pe-name-in" type="text" placeholder="예: 단자대 20P" class="w-32 px-2 py-1 text-xs border border-slate-300 rounded"/></label>
            <label class="flex items-center justify-between"><span class="text-xs text-slate-500">타입</span>
              <select id="pe-type" class="w-32 px-1 py-1 text-xs border border-slate-300 rounded">
                <option value="TB">단자대 TB</option><option value="RELAY">릴레이</option>
                <option value="MCCB">MCCB</option><option value="MCB">MCB</option><option value="ELCB">ELCB</option>
                <option value="MC">MC</option><option value="CP">CP</option><option value="SMPS">SMPS</option>
                <option value="PLC">PLC</option><option value="NF">노이즈필터 NF</option>
                <option value="STOP">스토퍼</option><option value="ETC">기타</option>
              </select></label>
            <label class="flex items-center justify-between"><span class="text-xs text-slate-500">가로(mm)</span>
              <input id="pe-w" type="number" class="w-32 px-2 py-1 text-xs border border-slate-300 rounded text-right"/></label>
            <label class="flex items-center justify-between"><span class="text-xs text-slate-500">세로(mm)</span>
              <input id="pe-h" type="number" class="w-32 px-2 py-1 text-xs border border-slate-300 rounded text-right"/></label>
            <label class="flex items-center justify-between"><span class="text-xs text-slate-500">다음 단자명</span>
              <input id="pe-next" type="text" class="w-32 px-2 py-1 text-xs border border-slate-300 rounded" value="A1"/></label>
            <div class="border-t border-slate-100 pt-2 mt-1">
              <label class="flex items-center justify-between"><span class="text-xs text-slate-500">단자 모양</span>
                <select id="pe-tshape" class="w-32 px-1 py-1 text-xs border border-slate-300 rounded">
                  <option value="circle">● 원형</option><option value="rect">■ 사각형</option>
                </select></label>
              <label class="flex items-center justify-between"><span class="text-xs text-slate-500"><span id="pe-tw-label">지름</span>(mm)</span>
                <input id="pe-tw" type="number" step="0.5" class="w-32 px-2 py-1 text-xs border border-slate-300 rounded text-right" value="3.6"/></label>
              <label id="pe-th-row" class="flex items-center justify-between" style="display:none"><span class="text-xs text-slate-500">세로(mm)</span>
                <input id="pe-th" type="number" step="0.5" class="w-32 px-2 py-1 text-xs border border-slate-300 rounded text-right" value="3.6"/></label>
              <label class="flex items-center justify-between"><span class="text-xs text-slate-500">글씨 위치</span>
                <select id="pe-tlabel" class="w-32 px-1 py-1 text-xs border border-slate-300 rounded">
                  <option value="top">위</option><option value="bottom">아래</option>
                  <option value="left">왼쪽</option><option value="right">오른쪽</option>
                </select></label>
            </div>
            <p class="text-[10px] text-slate-400 leading-tight">박스 클릭 → 단자 추가. 단자 드래그 → 이동. 단자 선택 후 모양·크기 바꾸면 그 단자에 적용. ✕ → 삭제.</p>
          </div>
          <div id="pe-terms" class="flex-1 overflow-y-auto p-2"></div>
        </div>
      </div>
      <div class="flex items-center justify-end gap-2 px-4 py-2 border-t border-slate-200">
        <button id="pe-apply" class="toolbtn bg-blue-600 text-white border-blue-600 hidden" title="배치된 같은 부품 전체 + 라이브러리를 한 번에 갱신">💾 적용 (배치+라이브러리)</button>
        <button id="pe-save" class="toolbtn bg-teal-600 text-white border-teal-600" title="라이브러리에 저장(배치된 동일 부품도 함께 갱신)">💾 라이브러리에 저장</button>
        <button id="pe-cancel2" class="toolbtn bg-white text-slate-700 hidden">취소</button>
      </div>
    </div>
  </div>

  <!-- 모듈 로드 (순서 중요) -->
  <script src="src/store.js"></script>
  <script src="src/terminals.js"></script>
  <script src="src/wires.js"></script>
  <script src="src/dims.js"></script>
  <script src="src/geom.js"></script>
  <script src="src/viewport.js"></script>
  <script src="src/render.js"></script>
  <script src="src/persistence.js"></script>
  <script src="src/export.js"></script>
  <script src="src/library/seed.js"></script>
  <script src="src/library/parts-builtin.js"></script>
  <script src="src/library/parts-ls.js"></script>
  <script src="src/library/parts-dwg.js"></script>
  <script src="src/library/userlib.js"></script>
  <script src="src/library/edz.js"></script>
  <script src="src/library/palette.js"></script>
  <script src="src/interact.js"></script>
  <script src="src/ui/toolbar.js"></script>
  <script src="src/ui/inspector.js"></script>
  <script src="src/ui/part-editor.js"></script>
  <script src="src/main.js"></script>
</body>
</html>
